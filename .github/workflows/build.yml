name: Finta CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore Finta.slnx

    - name: Build
      run: dotnet build Finta.slnx --no-restore --configuration Release

    - name: Test
      run: dotnet test Finta.slnx --no-build --configuration Release --verbosity normal